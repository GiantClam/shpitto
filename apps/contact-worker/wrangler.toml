name = "shpitto-contact-service"
main = "src/index.js"
compatibility_date = "2026-04-13"
workers_dev = true

# Set account_id from your Cloudflare account.
account_id = "9630806d5a588fc350ee64c395005cfa"

[vars]
# Optional. If set, OPTIONS/JSON responses will use this value.
CORS_ALLOW_ORIGIN = "*"
# Optional fallback target when no Referer header exists.
# DEFAULT_REDIRECT_URL = "https://your-app-domain/"

[[d1_databases]]
binding = "CONTACT_DB"
database_name = "shpitto"
database_id = "73af9ace-6d29-42f2-a109-dd65cf473cc7"

[[r2_buckets]]
binding = "CONTACT_ARCHIVE_BUCKET"
bucket_name = "shpitto"
